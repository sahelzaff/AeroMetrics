services:
  postgres:
    image: postgres:16-alpine
    container_name: aviation-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aviation_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: aviation-test-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aviation_test?schema=public
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
      JWT_ACCESS_SECRET: change-this-access-secret
      JWT_REFRESH_SECRET: change-this-refresh-secret
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_CALLBACK_URL: http://localhost:4000/auth/google/callback
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: aviation-test-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"

volumes:
  postgres_data:
